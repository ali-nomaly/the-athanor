<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBHUB // ALI·VERSE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; min-height: 100%;
  background: #080808;
  color: #C7FF43;
  font-family: 'IBM Plex Mono', monospace;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
  pointer-events: none;
  z-index: 100;
}

#corner-tl, #corner-tr {
  position: fixed;
  width: 16px; height: 16px;
  border-color: rgba(199,255,67,0.35);
  border-style: solid;
  z-index: 200;
}
#corner-tl { top: 48px; left: 8px; border-width: 1px 0 0 1px; }
#corner-tr { top: 48px; right: 8px; border-width: 1px 1px 0 0; }

#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid rgba(199,255,67,0.2);
  background: rgba(8,8,8,0.97);
  z-index: 150;
}

#header-left {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

#hub-domain {
  font-size: 8px;
  letter-spacing: 0.25em;
  color: rgba(199,255,67,0.35);
  text-transform: uppercase;
}

#hub-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

#header-right {
  display: flex;
  gap: 20px;
  align-items: center;
}

.nav-link {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(199,255,67,0.4);
  text-decoration: none;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-link:hover { color: #C7FF43; }

#subheader {
  margin-top: 44px;
  padding: 14px 28px;
  border-bottom: 1px solid rgba(199,255,67,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#hub-gloss {
  font-size: 10px;
  color: rgba(199,255,67,0.35);
  letter-spacing: 0.1em;
  line-height: 1.6;
  max-width: 600px;
}

#entry-count {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(199,255,67,0.25);
}

#grid-container {
  padding: 28px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
}

.entry-card {
  border: 1px solid rgba(199,255,67,0.12);
  background: rgba(199,255,67,0.015);
  padding: 20px;
  cursor: pointer;
  position: relative;
  transition: border-color 0.2s, background 0.2s;
  text-decoration: none;
  display: block;
  overflow: hidden;
}

.entry-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: transparent;
  transition: background 0.2s;
}

.entry-card:hover {
  border-color: rgba(199,255,67,0.4);
  background: rgba(199,255,67,0.04);
}

.entry-card:hover::before { background: #C7FF43; }

.card-date {
  font-size: 8px;
  letter-spacing: 0.2em;
  color: rgba(199,255,67,0.3);
  margin-bottom: 10px;
  text-transform: uppercase;
}

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: #C7FF43;
  margin-bottom: 10px;
  line-height: 1.4;
  text-transform: uppercase;
}

.card-gloss {
  font-size: 10px;
  color: rgba(199,255,67,0.45);
  line-height: 1.8;
  margin-bottom: 14px;
  border-left: 2px solid rgba(199,255,67,0.15);
  padding-left: 10px;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-tag {
  font-size: 7px;
  letter-spacing: 0.2em;
  padding: 2px 8px;
  border: 1px solid rgba(199,255,67,0.2);
  color: rgba(199,255,67,0.4);
  text-transform: uppercase;
}

.card-arrow {
  font-size: 10px;
  color: rgba(199,255,67,0.25);
  transition: color 0.2s, transform 0.2s;
}
.entry-card:hover .card-arrow {
  color: #C7FF43;
  transform: translateX(4px);
}

#status-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-top: 1px solid rgba(199,255,67,0.1);
  background: rgba(8,8,8,0.97);
  font-size: 8px;
  letter-spacing: 0.15em;
  color: rgba(199,255,67,0.25);
  z-index: 150;
}

#grid-container { padding-bottom: 48px; }

#empty-state {
  grid-column: 1 / -1;
  padding: 60px 20px;
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(199,255,67,0.2);
  text-transform: uppercase;
}
</style>
</head>
<body>

<div id="corner-tl"></div>
<div id="corner-tr"></div>

<header id="header">
  <div id="header-left">
    <span id="hub-domain">CORPUS</span>
    <span id="hub-title">ANALYSIS</span>
  </div>
  <div id="header-right">
    <a class="nav-link" href="/">← ATHANOR</a>
    <a class="nav-link" href="/log/">LOG</a>
    <span class="nav-link" id="entry-count">—</span>
  </div>
</header>

<div id="subheader">
  <div id="hub-gloss">Visual guides for media analysis. Film, TV, games, music, literature.</div>
</div>

<div id="grid-container">
  <div id="empty-state">NO ENTRIES YET // ARCHIVE AWAITING FIRST TRANSMISSION</div>
</div>

<div id="status-bar">
  <span id="status-domain">MAGI:ACTIVE // CORPUS:ANALYSIS</span>
  <span id="status-date"></span>
  <span>alinomali.com</span>
</div>

<script>
// ── CONFIGURATION — edit these per sub-hub ──
const HUB_CONFIG = {
  domain: 'CORPUS',
  title:  'ANALYSIS',
  gloss:  'Visual guides for media analysis. Film, TV, games, music, literature.',
  manifestPath: '/corpus/analysis/manifest.json',
  statusLabel: 'CORPUS:ANALYSIS'
};

document.getElementById('hub-domain').textContent  = HUB_CONFIG.domain;
document.getElementById('hub-title').textContent   = HUB_CONFIG.title;
document.getElementById('hub-gloss').textContent   = HUB_CONFIG.gloss;
document.getElementById('status-domain').textContent = 'MAGI:ACTIVE // ' + HUB_CONFIG.statusLabel;
document.getElementById('status-date').textContent = new Date().toISOString().slice(0,10).replace(/-/g,'.');
document.title = HUB_CONFIG.title + ' // ALI·VERSE';

async function loadEntries() {
  try {
    const res  = await fetch(HUB_CONFIG.manifestPath);
    const data = await res.json();
    const entries = data.entries.sort((a, b) => b.date.localeCompare(a.date));
    renderGrid(entries);
    document.getElementById('entry-count').textContent = entries.length + ' ENTRIES';
  } catch(e) {
    document.getElementById('entry-count').textContent = '0 ENTRIES';
  }
}

function renderGrid(entries) {
  const grid = document.getElementById('grid-container');
  if (!entries.length) return;
  grid.innerHTML = '';

  entries.forEach(entry => {
    const card = document.createElement('a');
    card.className = 'entry-card';
    card.href = entry.path;
    card.innerHTML = `
      <div class="card-date">${entry.date}</div>
      <div class="card-title">${entry.title}</div>
      <div class="card-gloss">${entry.gloss}</div>
      <div class="card-footer">
        <span class="card-tag">${entry.tag || HUB_CONFIG.title}</span>
        <span class="card-arrow">→</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

loadEntries();
</script>
</body>
</html>
