<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The First Dream</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050508;
    --deep: #0a0a12;
    --forest-dark: #0d1a0f;
    --forest-mid: #152418;
    --forest-light: #1e3422;
    --snow: #e8eef2;
    --cream: #f0e6d0;
    --null-text: #7eb8a4;
    --null-dim: #3d7a65;
    --ice: #a8c8d8;
    --ice-deep: #4a8fa8;
    --fire: #e8724a;
    --water: #4a8fa8;
    --earth: #8a6f3a;
    --air: #9ab8c8;
    --aether: #c8a8e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--snow);
    font-family: 'Crimson Pro', serif;
    font-size: 18px;
    line-height: 1.8;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: default;
  }

  #game {
    width: 100vw;
    height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* FOREST BACKGROUND */
  #forest-bg {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 3s ease;
    background: var(--forest-dark);
    overflow: hidden;
  }

  #forest-bg.visible { opacity: 1; }

  .tree-layer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100%;
  }

  /* Pixel trees via CSS */
  .tree {
    position: absolute;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .tree-trunk {
    background: #1a0f08;
    image-rendering: pixelated;
  }

  .tree-canopy {
    image-rendering: pixelated;
  }

  /* Snow particles */
  .snowflake {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(232, 238, 242, 0.6);
    image-rendering: pixelated;
    animation: snowfall linear infinite;
  }

  @keyframes snowfall {
    0% { transform: translateY(-10px) translateX(0px); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.4; }
    100% { transform: translateY(100vh) translateX(20px); opacity: 0; }
  }

  /* Ground */
  #ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 120px;
    background: linear-gradient(to top, #1a2e1c 0%, #152418 40%, transparent 100%);
    opacity: 0;
    transition: opacity 3s ease 1s;
  }

  #ground.visible { opacity: 1; }

  /* Snow ground overlay */
  #snow-ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: linear-gradient(to top, rgba(168,188,200,0.15) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 3s ease 2s;
  }

  #snow-ground.visible { opacity: 1; }

  /* Frozen lake */
  #lake {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 60px;
    background: linear-gradient(135deg, rgba(74,143,168,0.3) 0%, rgba(168,200,216,0.2) 50%, rgba(74,143,168,0.15) 100%);
    border: 1px solid rgba(168,200,216,0.2);
    opacity: 0;
    transition: opacity 3s ease 2s;
    image-rendering: pixelated;
  }

  #lake.visible { opacity: 1; }

  /* Atmospheric light source */
  #light-source {
    position: absolute;
    top: 30%;
    right: 25%;
    width: 4px;
    height: 4px;
    background: rgba(200,220,210,0.8);
    box-shadow: 0 0 20px 10px rgba(180,210,200,0.1), 0 0 60px 30px rgba(140,180,170,0.05);
    opacity: 0;
    transition: opacity 4s ease 3s;
    image-rendering: pixelated;
  }

  #light-source.visible { opacity: 1; }

  /* Crack in sky */
  #sky-crack {
    position: absolute;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 0;
    background: linear-gradient(to bottom, transparent, rgba(200,168,232,0.6), transparent);
    transition: height 2s ease;
    opacity: 0;
  }

  #sky-crack.visible {
    height: 80px;
    opacity: 1;
  }

  /* SPRITE */
  #sprite-container {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 2s ease;
    z-index: 10;
  }

  #sprite-container.visible { opacity: 1; }

  /* Pixel sprite - CSS drawn */
  .sprite {
    width: 32px;
    height: 48px;
    position: relative;
    image-rendering: pixelated;
    animation: sprite-breathe 3s ease-in-out infinite;
  }

  @keyframes sprite-breathe {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-2px); }
  }

  /* Sprite built from divs */
  .sprite-pixel {
    position: absolute;
    image-rendering: pixelated;
  }

  /* Elemental glow around sprite */
  .sprite-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 2s ease, background 1s ease;
    filter: blur(15px);
  }

  /* DIALOGUE BOX */
  #dialogue-box {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    min-height: 160px;
    background: rgba(5, 5, 8, 0.92);
    border-top: 2px solid rgba(126, 184, 164, 0.3);
    padding: 24px 40px 20px;
    z-index: 20;
    backdrop-filter: blur(4px);
  }

  /* Pixel border decoration */
  #dialogue-box::before {
    content: '';
    position: absolute;
    top: -4px;
    left: 0;
    right: 0;
    height: 2px;
    background: repeating-linear-gradient(
      to right,
      transparent 0px,
      transparent 4px,
      rgba(126,184,164,0.15) 4px,
      rgba(126,184,164,0.15) 8px
    );
  }

  #null-label {
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: var(--null-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #null-label.visible { opacity: 1; }

  #dialogue-text {
    font-family: 'Crimson Pro', serif;
    font-size: 17px;
    font-style: italic;
    color: var(--snow);
    line-height: 1.9;
    min-height: 60px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #dialogue-text.visible { opacity: 1; }

  /* TITLE SCREEN */
  #title-screen {
    position: absolute;
    inset: 0;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 2s ease;
  }

  #title-screen.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  #title-text {
    font-family: 'VT323', monospace;
    font-size: 52px;
    color: var(--null-text);
    letter-spacing: 8px;
    text-transform: uppercase;
    opacity: 0;
    animation: title-appear 2s ease 1s forwards;
    text-shadow: 0 0 20px rgba(126,184,164,0.3);
  }

  #title-sub {
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--null-dim);
    letter-spacing: 4px;
    margin-top: 12px;
    opacity: 0;
    animation: title-appear 2s ease 2s forwards;
  }

  @keyframes title-appear {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CHOICES */
  #choices {
    display: none;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
    width: 100%;
  }

  #choices.visible {
    display: flex;
  }

  .choice-btn {
    background: transparent;
    border: none;
    color: var(--snow);
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    font-style: italic;
    text-align: left;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    opacity: 0.7;
    line-height: 1.6;
    border-left: 2px solid transparent;
  }

  .choice-btn::before {
    content: '▶';
    font-family: 'VT323', monospace;
    font-size: 12px;
    margin-right: 10px;
    color: var(--null-dim);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .choice-btn:hover {
    opacity: 1;
    color: var(--null-text);
    border-left: 2px solid var(--null-dim);
    padding-left: 20px;
  }

  .choice-btn:hover::before { opacity: 1; }

  /* Action buttons */
  #action-btns {
    display: none;
    gap: 40px;
    margin-top: 20px;
    justify-content: center;
  }

  #action-btns.visible { display: flex; }

  .action-btn {
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--snow);
    background: transparent;
    border: 1px solid rgba(232,238,242,0.2);
    padding: 8px 24px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }

  .action-btn:hover {
    border-color: var(--null-text);
    color: var(--null-text);
    box-shadow: 0 0 10px rgba(126,184,164,0.2);
  }

  /* QUESTION COUNTER */
  #question-counter {
    position: absolute;
    top: 20px;
    right: 24px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--null-dim);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 30;
  }

  #question-counter.visible { opacity: 1; }

  /* RESULT SCREEN */
  #result-screen {
    position: absolute;
    inset: 0;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease;
    padding: 40px;
    text-align: center;
  }

  #result-screen.visible {
    opacity: 1;
    pointer-events: all;
  }

  #result-element-label {
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--null-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  #result-type-name {
    font-family: 'VT323', monospace;
    font-size: 64px;
    letter-spacing: 4px;
    line-height: 1;
    margin-bottom: 24px;
  }

  #result-description {
    font-family: 'Crimson Pro', serif;
    font-size: 18px;
    font-style: italic;
    color: rgba(232,238,242,0.8);
    max-width: 520px;
    line-height: 1.9;
    margin-bottom: 32px;
  }

  #result-null-closing {
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    color: var(--null-dim);
    font-style: italic;
    max-width: 400px;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  #enter-realm-btn {
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--snow);
    background: transparent;
    border: 1px solid rgba(232,238,242,0.3);
    padding: 12px 32px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }

  #enter-realm-btn:hover {
    border-color: var(--snow);
    box-shadow: 0 0 20px rgba(232,238,242,0.1);
  }

  /* Pixel sprite CSS art */
  #sprite-art {
    width: 64px;
    height: 96px;
    image-rendering: pixelated;
    position: relative;
    margin-bottom: 24px;
  }

  canvas#sprite-canvas {
    image-rendering: pixelated;
    width: 64px;
    height: 96px;
  }

  canvas#sprite-canvas-large {
    image-rendering: pixelated;
    width: 128px;
    height: 192px;
    margin-bottom: 24px;
    animation: sprite-breathe 3s ease-in-out infinite;
  }

  /* Scanline overlay */
  #scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 200;
    opacity: 0.4;
  }

  /* Vignette */
  #vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5,5,8,0.7) 100%);
    pointer-events: none;
    z-index: 199;
  }

  /* text cursor blink */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: var(--null-text);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Atmospheric fog layers */
  .fog-layer {
    position: absolute;
    width: 200%;
    height: 60%;
    bottom: 10%;
    background: linear-gradient(to right,
      transparent 0%,
      rgba(13,26,15,0.4) 20%,
      rgba(13,26,15,0.6) 50%,
      rgba(13,26,15,0.4) 80%,
      transparent 100%
    );
    animation: fog-drift linear infinite;
    opacity: 0;
    transition: opacity 3s ease;
  }

  .fog-layer.visible { opacity: 1; }
  .fog-layer:nth-child(2) { animation-duration: 40s; animation-delay: -10s; bottom: 5%; opacity: 0.6; }

  @keyframes fog-drift {
    0% { transform: translateX(-50%); }
    100% { transform: translateX(0%); }
  }

  /* Scroll indicator */
  #scroll-hint {
    position: absolute;
    bottom: 170px;
    right: 24px;
    font-family: 'VT323', monospace;
    font-size: 12px;
    color: var(--null-dim);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 30;
    writing-mode: vertical-rl;
  }

  #scroll-hint.visible { opacity: 0.5; }

  /* Environment state indicator (hidden, for logic) */
  #env-state {
    display: none;
  }

  /* Progress dots */
  #progress {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 30;
  }

  #progress.visible { opacity: 1; }

  .progress-dot {
    width: 4px;
    height: 4px;
    background: var(--null-dim);
    opacity: 0.3;
    transition: opacity 0.5s ease, background 0.5s ease;
    image-rendering: pixelated;
  }

  .progress-dot.active {
    opacity: 1;
    background: var(--null-text);
  }

  .progress-dot.done {
    opacity: 0.6;
    background: var(--null-dim);
  }
</style>
</head>
<body>

<div id="scanlines"></div>
<div id="vignette"></div>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div id="title-text">THE FIRST DREAM</div>
  <div id="title-sub">an initiation</div>
</div>

<!-- MAIN GAME -->
<div id="game">

  <!-- Forest Background -->
  <div id="forest-bg">
    <!-- Fog -->
    <div class="fog-layer" id="fog1"></div>
    <div class="fog-layer" id="fog2"></div>

    <!-- Atmospheric light -->
    <div id="light-source"></div>

    <!-- Sky crack (appears Q5) -->
    <div id="sky-crack"></div>

    <!-- Trees drawn by JS -->
    <canvas id="forest-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>

    <!-- Ground -->
    <div id="ground"></div>
    <div id="snow-ground"></div>

    <!-- Lake -->
    <div id="lake"></div>
  </div>

  <!-- Sprite -->
  <div id="sprite-container">
    <div style="position:relative;">
      <div class="sprite-glow" id="sprite-glow"></div>
      <canvas id="sprite-canvas" width="16" height="24"></canvas>
    </div>
  </div>

  <!-- Progress -->
  <div id="progress">
    <div class="progress-dot" id="dot-0"></div>
    <div class="progress-dot" id="dot-1"></div>
    <div class="progress-dot" id="dot-2"></div>
    <div class="progress-dot" id="dot-3"></div>
    <div class="progress-dot" id="dot-4"></div>
    <div class="progress-dot" id="dot-5"></div>
    <div class="progress-dot" id="dot-6"></div>
    <div class="progress-dot" id="dot-7"></div>
  </div>

  <!-- Question counter -->
  <div id="question-counter"></div>

  <!-- Dialogue Box -->
  <div id="dialogue-box">
    <div id="null-label">NULL</div>
    <div id="dialogue-text"></div>
    <div id="choices"></div>
    <div id="action-btns"></div>
  </div>

</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <canvas id="sprite-canvas-large" width="32" height="48"></canvas>
  <div id="result-element-label"></div>
  <div id="result-type-name"></div>
  <div id="result-description"></div>
  <div id="result-null-closing"></div>
  <button id="enter-realm-btn">Enter The Realm</button>
</div>

<script>
// ============================================
// SCORING & TYPE SYSTEM
// ============================================

const scores = {
  fire: 0,    // Intuition
  water: 0,   // Feeling
  earth: 0,   // Sensing
  air: 0,     // Thinking
  extro: 0,
  intro: 0
};

// Each answer: [element, orientation]
// orientation: 'e' = extraverted, 'i' = introverted, 'n' = neutral

const questions = [
  {
    id: 0,
    env: 'forest-open',
    text: `You are standing in a forest that has been here longer than memory.\n\nThe trees don't move.\n\nThe light doesn't change.\n\nSomewhere ahead, through the black branches — something is waiting.\n\nYou don't know what. You don't know how far.\n\nBehind you, the way you came is already gone.\n\nWhat moves in you first?`,
    choices: [
      { text: "The need to move toward it.\nWhatever is waiting — standing still is worse than not knowing.", score: ['fire', 'e'] },
      { text: "Stillness.\nYou read the forest before you move through it.\nIt will tell you something if you let it.", score: ['earth', 'i'] },
      { text: "A question.\nNot fear. Not curiosity.\nA specific, precise question about what this place is and why you are in it.", score: ['air', 'i'] },
      { text: "Recognition.\nYou have been here before.\nNot this forest — this feeling.\nYou know how to be in places that don't explain themselves.", score: ['water', 'i'] }
    ]
  },
  {
    id: 1,
    env: 'lake-appears',
    text: `In the world you came from —\nthe one you were in before this —\n\nWhen something is wrong,\nhow do you know?`,
    choices: [
      { text: "Your body tells you first.\nSomething tightens. Something shifts.\nBefore you have words for it, you already know.", score: ['earth', 'i'] },
      { text: "The pattern breaks.\nYou see the thing that doesn't fit the logic of everything around it.\nThe anomaly is obvious to you even when no one else sees it.", score: ['air', 'e'] },
      { text: "Someone's face tells you.\nYou read people before you read situations.\nThe room changes in a way only you seem to notice.", score: ['water', 'e'] },
      { text: "You feel it coming before it arrives.\nNot the wrongness itself — the shape of what the wrongness will become.\nYou have already seen where this is going.", score: ['fire', 'i'] }
    ]
  },
  {
    id: 2,
    env: 'figure-appears',
    text: `A figure appears at the edge of the trees.\n\nYou cannot see their face.\n\nThey are not threatening.\nThey are not welcoming.\n\nThey are simply — there.\n\nWaiting for you to decide what they mean.\n\nWhat do you do?`,
    choices: [
      { text: "You observe before you move.\nGather information.\nTheir posture. Their stillness.\nWhat they are not doing tells you more than what they are.", score: ['air', 'i'] },
      { text: "You move toward them.\nNot out of trust — out of need.\nWhatever they know, you need to know it too.", score: ['fire', 'e'] },
      { text: "You feel the weight of their presence before anything else.\nSomething about them is familiar in a way that has nothing to do with having met before.", score: ['water', 'i'] },
      { text: "You wait.\nLet them make the first move.\nThis is their forest too.\nThe next gesture belongs to them.", score: ['earth', 'i'] }
    ]
  },
  {
    id: 3,
    env: 'figure-offers',
    text: `The figure raises their hand.\n\nIn it — four objects.\n\nThey are offering you one.\n\nYou don't know what any of them do.\n\nYou choose anyway.`,
    choices: [
      { text: "A small stone.\nPerfectly smooth. Warm despite the cold.\nIt has been held by many hands before yours.", score: ['earth', 'i'] },
      { text: "A folded piece of paper.\nSomething written inside.\nYou won't be able to read it until you've gone further.", score: ['air', 'i'] },
      { text: "A compass that points in a direction that has no name.", score: ['fire', 'e'] },
      { text: "Nothing.\nYou don't take anything.\nWhatever you need you already have\nor will find.", score: ['water', 'i'] }
    ]
  },
  {
    id: 4,
    env: 'crack-appears',
    text: `The dream cracks.\n\nJust slightly.\n\nThrough the crack — the world you came from.\n\nYou see it the way you see something you've been too close to to see clearly.\n\nA screen. Dozens of voices.\nAll of them talking. None of them listening.\nSomething being consumed.\nSomething doing the consuming.\nThe line between them no longer visible.\n\nThe crack closes.\n\nYou are back in the forest.\n\nWhat stays with you?`,
    choices: [
      { text: "Clarity.\nYou saw the mechanism of it.\nHow the system sustains itself.\nThe problem is structural and you already know where you would begin.", score: ['air', 'e'] },
      { text: "Grief.\nNot for the thing being consumed — for the people inside it who forgot they had a choice.\nOr were never told they did.", score: ['water', 'e'] },
      { text: "Recognition.\nYou already knew this.\nThe crack didn't show you anything new — it just confirmed what your body has been saying for a long time.", score: ['earth', 'i'] },
      { text: "A question that has no answer yet.\nNot about the system — about what comes after.\nYou are already living slightly ahead of now.", score: ['fire', 'i'] }
    ]
  },
  {
    id: 5,
    env: 'lake-edge',
    text: `The ice begins to crack beneath you.\n\nNot quickly.\n\nSlowly.\n\nYou have time.\n\nAcross the lake — the path continues.\n\nBehind you — the forest you came through.\n\nThe ice will not hold much longer.\n\nWhat do you do?`,
    choices: [
      { text: "Move forward.\nQuickly, decisively.\nThe path continues and stopping is its own risk.\nYou will deal with the ice by getting off it.", score: ['fire', 'e'] },
      { text: "Move back.\nThe known ground is more reliable than the unknown shore.\nYou recalculate from safety.", score: ['earth', 'i'] },

function drawSprite(canvas, elementColor) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const scale = w / 16;

  // Color palette
  const skin = '#e8c9a0';
  const skinDark = '#c9a878';
  const robe = '#f0e6d0';
  const robeDark = '#d4c8b0';

  const hair = '#4a3828';
  const hairLight = '#5a4838';

  const flower2 = '#f8d860';
  const eyes = '#2a2018';
  const outline = '#1a1410';

  const p = (x, y, color) => {
    ctx.fillStyle = color;
    ctx.fillRect(x * scale, y * scale, scale, scale);
  };

  // HEAD
  p(6,1,outline); p(7,1,outline); p(8,1,outline); p(9,1,outline);
  p(5,2,outline); p(6,2,skin); p(7,2,skin); p(8,2,skin); p(9,2,skin); p(10,2,outline);

  p(6,6,outline); p(7,6,skin); p(8,6,skinDark); p(9,6,skin); p(10,6,outline);

  // HAIR

  p(4,3,hair); p(5,3,hair); p(11,3,hair);

  // ROBE BODY
  p(5,8,outline); p(6,8,robe); p(7,8,robe); p(8,8,robe); p(9,8,robe); p(10,8,robe); p(11,8,outline);
  p(4,9,outline); p(5,9,robe); p(6,9,robe); p(7,9,robeDark); p(8,9,robeDark); p(9,9,robe); p(10,9,robe); p(11,9,robe); p(12,9,outline);
  p(4,10,outline); p(5,10,robe); p(6,10,robe); p(7,10,robeDark); p(8,10,robeDark); p(9,10,robe); p(10,10,robe); p(11,10,robe); p(12,10,outline);
  p(3,11,outline); p(4,11,robe); p(5,11,robe); p(6,11,robeDark); p(7,11,robeShadow); p(8,11,robeShadow); p(9,11,robeDark); p(10,11,robe); p(11,11,robe); p(12,11,robe); p(13,11,outline);
  p(3,12,outline); p(4,12,robe); p(5,12,robe); p(6,12,robeDark); p(7,12,robeShadow); p(8,12,robeShadow); p(9,12,robeDark); p(10,12,robe); p(11,12,robe); p(12,12,robe); p(13,12,outline);
  p(3,13,outline); p(4,13,robe); p(5,13,robe); p(6,13,robe); p(7,13,robeDark); p(8,13,robeDark); p(9,13,robe); p(10,13,robe); p(11,13,robe); p(12,13,robe); p(13,13,outline);

// ============================================
// FOREST DRAWING
// ============================================

function drawForest(canvas, envState) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (!envState || envState === 'black') return;

  // Tree positions
  const trees = [
    {x: 0.05, h: 0.85, w: 18},
    {x: 0.12, h: 0.75, w: 14},
    {x: 0.18, h: 0.9, w: 20},
    {x: 0.25, h: 0.7, w: 12},
    {x: 0.32, h: 0.8, w: 16},
    {x: 0.68, h: 0.8, w: 16},
    {x: 0.75, h: 0.7, w: 12},
    {x: 0.82, h: 0.9, w: 20},
    {x: 0.88, h: 0.75, w: 14},
    {x: 0.95, h: 0.85, w: 18},
    {x: 0.08, h: 0.6, w: 10},
    {x: 0.92, h: 0.6, w: 10},
    {x: 0.15, h: 0.65, w: 11},
    {x: 0.85, h: 0.65, w: 11},
  ];

  trees.forEach(tree => {
    const x = Math.floor(tree.x * W);
    const treeH = Math.floor(tree.h * H);
    const tw = tree.w;

    // Trunk
    const trunkW = Math.max(2, Math.floor(tw * 0.15));
    const trunkH = Math.floor(treeH * 0.3);
    ctx.fillStyle = '#0f0a06';
    ctx.fillRect(x - trunkW/2, H - trunkH, trunkW, trunkH);

    // Canopy layers (pixel style)
    const layers = 4;
    for (let i = 0; i < layers; i++) {
      const layerY = H - trunkH - (i * (treeH * 0.2));
      const layerW = tw * (1 - i * 0.15);
      const alpha = 0.7 + (i * 0.08);

      // Vary green slightly
      const g = Math.floor(20 + i * 8);
      const r = Math.floor(8 + i * 3);
      ctx.fillStyle = `rgba(${r}, ${g}, ${r+2}, ${alpha})`;

      // Pixel-ish triangle
      for (let py = 0; py < treeH * 0.22; py += 2) {
        const rowW = layerW * (1 - py / (treeH * 0.22));
        ctx.fillRect(x - rowW/2, layerY - py, rowW, 2);
      }
    }

    // Snow on branches
    if (envState !== 'black') {
      ctx.fillStyle = 'rgba(200,215,220,0.15)';
      ctx.fillRect(x - tw/2, H - trunkH - treeH * 0.22, tw, 3);
      ctx.fillRect(x - tw*0.7/2, H - trunkH - treeH * 0.42, tw*0.7, 2);
    }
  });

  // Older trees on other side (Q6+)
  if (envState === 'other-side' || envState === 'void') {
    const ancientTrees = [
      {x: 0.35, h: 0.95, w: 24},
      {x: 0.42, h: 0.88, w: 20},
      {x: 0.58, h: 0.88, w: 20},
      {x: 0.65, h: 0.95, w: 24},
    ];

    ancientTrees.forEach(tree => {
      const x = Math.floor(tree.x * W);
      const treeH = Math.floor(tree.h * H);
      const tw = tree.w;
      const trunkW = Math.max(3, Math.floor(tw * 0.2));
      const trunkH = Math.floor(treeH * 0.35);

      ctx.fillStyle = '#0a0705';
      ctx.fillRect(x - trunkW/2, H - trunkH, trunkW, trunkH);

      const layers = 5;
      for (let i = 0; i < layers; i++) {
        const layerY = H - trunkH - (i * (treeH * 0.18));
        const layerW = tw * (1 - i * 0.12);
        ctx.fillStyle = `rgba(12, 28, 14, ${0.8 + i * 0.04})`;
        for (let py = 0; py < treeH * 0.2; py += 2) {
          const rowW = layerW * (1 - py / (treeH * 0.2));
          ctx.fillRect(x - rowW/2, layerY - py, rowW, 2);
        }
      }

      // Warm glow on ancient trees
      ctx.fillStyle = 'rgba(180,140,80,0.04)';
      ctx.fillRect(x - tw, H - treeH, tw * 2, treeH);
    });
  }
}

// ============================================

function setEnvironment(state) {
  const forestBg = document.getElementById('forest-bg');
  const ground = document.getElementById('ground');
  const snowGround = document.getElementById('snow-ground');
  const lake = document.getElementById('lake');
  const lightSource = document.getElementById('light-source');
  const crack = document.getElementById('sky-crack');
  const fog1 = document.getElementById('fog1');
  const forestCanvas = document.getElementById('forest-canvas');

  forestCanvas.width = window.innerWidth;
  forestCanvas.height = window.innerHeight;

  switch(state) {
    case 'forest-open':
      forestBg.classList.add('visible');
      ground.classList.add('visible');
      snowGround.classList.add('visible');
      lightSource.classList.add('visible');
      fog1.classList.add('visible');
      setTimeout(() => drawForest(forestCanvas, state), 500);
      break;

    case 'lake-appears':
      lake.classList.add('visible');
      drawForest(forestCanvas, state);
      break;

    case 'crack-appears':
      crack.classList.add('visible');
      drawForest(forestCanvas, state);
      break;

    case 'lake-edge':
      // Sprite moves to lake edge - handled visually
      document.getElementById('sprite-container').style.bottom = '50px';
      drawForest(forestCanvas, state);
      break;

    case 'other-side':
      document.getElementById('sprite-container').style.bottom = '80px';
      drawForest(forestCanvas, 'other-side');
      break;

    case 'void':
      // Q8 - forest fades, just sprite and darkness
      setTimeout(() => {
        forestBg.style.opacity = '0.15';
      }, 500);
      break;
  }
}

// ============================================

function calculateType() {
  const elements = ['fire','water','earth','air'];
  let dominant = elements.reduce((a, b) => scores[a] >= scores[b] ? a : b);
  const orientation = scores.extro >= scores.intro ? 'extro' : 'intro';
  return types[dominant][orientation];
}

let currentQuestion = -1;
let gameStarted = false;
let isTyping = false;
let typewriterTimeout = null;
let openingPhase = 0;

const openingSequence = [
  { text: "You were somewhere else a moment ago.", delay: 800 },
  { text: "You were somewhere else a moment ago.\n\nYou don't remember what.\n\nThat's fine.\n\nNeither does anyone else.", delay: 0 },
  { text: "I've been waiting here.\n\nNot for you specifically —\nfor whoever was ready to stop.\n\nYou stopped.\n\nSo here we are.", delay: 0 },
  { text: "This place has no official name.\n\nThe maps that exist of it were drawn by people like you — people who wandered in and decided to stay long enough to draw something.\n\nWhat you're looking at is the inside.\nNot mine.\nYours.\nOr close enough that the difference doesn't matter yet.", delay: 0 },
  { text: "Before you go any further —\nI need to ask you some things.\n\nNot to sort you.\nNot to sell you something.\n\nBecause in here, you need to know what you're made of.\n\nThe terrain responds to it.\n\nAre you ready?", delay: 0, showActions: true }
];

function typeText(text, callback) {
  const el = document.getElementById('dialogue-text');
  el.classList.add('visible');
  el.innerHTML = '';

  if (typewriterTimeout) clearTimeout(typewriterTimeout);

  // Process text with newlines
  const lines = text.split('\n');
  let html = '';
  lines.forEach((line, i) => {
    html += line + (i < lines.length - 1 ? '<br>' : '');
  });

  // Instant display for this experience
  el.innerHTML = html;
  if (callback) setTimeout(callback, 300);
}

function showChoices(choices) {
  const container = document.getElementById('choices');
  const actionBtns = document.getElementById('action-btns');
  actionBtns.classList.remove('visible');
  actionBtns.innerHTML = '';

  container.innerHTML = '';
  container.classList.add('visible');

  choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';

    const lines = choice.text.split('\n');
    btn.innerHTML = lines.join('<br>');

    btn.addEventListener('click', () => {
      if (isTyping) return;
      selectChoice(choice, i);
    });

    setTimeout(() => {
      container.appendChild(btn);
    }, i * 80);
  });
}

function selectChoice(choice, index) {
  // Score the choice
  const [element, orientation] = choice.score;
  scores[element] += 2;
  if (orientation === 'e') scores.extro++;
  else if (orientation === 'i') scores.intro++;

  // Clear choices
  const container = document.getElementById('choices');
  container.classList.remove('visible');
  container.innerHTML = '';

  // Update progress
  updateProgress(currentQuestion, true);

  // Advance
  setTimeout(() => {
    currentQuestion++;
    if (currentQuestion < questions.length) {
      showQuestion(currentQuestion);
    } else {
      showResult();
    }
  }, 400);
}

function showQuestion(index) {
  const q = questions[index];

  // Update counter
  const counter = document.getElementById('question-counter');
  counter.textContent = `${index + 1} / ${questions.length}`;
  counter.classList.add('visible');

  // Update progress
  updateProgress(index, false);

  // Set environment
  setEnvironment(q.env);

  // Show sprite
  document.getElementById('sprite-container').classList.add('visible');

  // Show text
  const nullLabel = document.getElementById('null-label');
  nullLabel.classList.add('visible');

  typeText(q.text, () => {
    showChoices(q.choices);
  });
}

function updateProgress(index, done) {
  const progress = document.getElementById('progress');
  progress.classList.add('visible');

  for (let i = 0; i < 8; i++) {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) continue;
    dot.classList.remove('active', 'done');
    if (i < index) dot.classList.add('done');
    else if (i === index) dot.classList.add(done ? 'done' : 'active');
  }
}

function showResult() {
  const type = calculateType();

  // Update sprite glow
  const glow = document.getElementById('sprite-glow');
  glow.style.background = type.color;
  glow.style.opacity = '0.4';

  // Redraw sprite with element color
  const smallCanvas = document.getElementById('sprite-canvas');
  drawSprite(smallCanvas, type.color);

  // Null closing text
  const nullLabel = document.getElementById('null-label');
  nullLabel.classList.add('visible');

  const dialogueText = document.getElementById('dialogue-text');
  const choices = document.getElementById('choices');
  const actionBtns = document.getElementById('action-btns');

  choices.classList.remove('visible');
  choices.innerHTML = '';
  actionBtns.classList.remove('visible');

  typeText(`I see you now.\n\nI saw you before —\nbut now you have shown me.\n\nThere is a difference.\n\nWhat you are has a name in this place.\n\nAre you ready to receive it?`, () => {
    const actionContainer = document.getElementById('action-btns');
    actionContainer.innerHTML = '';
    actionContainer.classList.add('visible');

    const yesBtn = document.createElement('button');
    yesBtn.className = 'action-btn';
    yesBtn.textContent = 'YES';
    yesBtn.addEventListener('click', () => revealType(type));
    actionContainer.appendChild(yesBtn);
  });
}

function revealType(type) {
  // Draw large sprite
  const largeCanvas = document.getElementById('sprite-canvas-large');
  drawSprite(largeCanvas, type.color);

  // Populate result screen
  document.getElementById('result-element-label').textContent = type.element;
  document.getElementById('result-element-label').style.color = type.color;
  document.getElementById('result-type-name').textContent = type.name;
  document.getElementById('result-type-name').style.color = type.color;
  document.getElementById('result-type-name').style.textShadow = `0 0 30px ${type.color}44`;
  document.getElementById('result-description').textContent = type.description;
  document.getElementById('result-null-closing').textContent = type.closing;

  // Show result screen
  setTimeout(() => {
    document.getElementById('result-screen').classList.add('visible');
  }, 500);
}

// ============================================
// OPENING SEQUENCE
// ============================================

function advanceOpening() {
  if (openingPhase >= openingSequence.length) return;

  const phase = openingSequence[openingPhase];
  const nullLabel = document.getElementById('null-label');
  nullLabel.classList.add('visible');

  const actionBtns = document.getElementById('action-btns');
  actionBtns.classList.remove('visible');
  actionBtns.innerHTML = '';

  typeText(phase.text, () => {
    if (phase.showActions) {
      showOpeningActions();
    } else {
      openingPhase++;
      setTimeout(() => advanceOpening(), phase.delay || 600);
    }
  });

  openingPhase++;
}

function showOpeningActions() {
  const actionContainer = document.getElementById('action-btns');
  actionContainer.innerHTML = '';
  actionContainer.classList.add('visible');

  const yesBtn = document.createElement('button');
  yesBtn.className = 'action-btn';
  yesBtn.textContent = 'YES';

  const noBtn = document.createElement('button');
  noBtn.className = 'action-btn';
  noBtn.textContent = "I DON'T KNOW";
  noBtn.style.fontSize = '16px';
  noBtn.style.letterSpacing = '2px';

  const handler = () => {
    actionContainer.classList.remove('visible');
    actionContainer.innerHTML = '';
    currentQuestion = 0;

    // Sprite appears
    document.getElementById('sprite-container').classList.add('visible');
    drawSprite(document.getElementById('sprite-canvas'), '#c8d8c0');

    setTimeout(() => {
      showQuestion(0);
    }, 600);
  };

  yesBtn.addEventListener('click', handler);
  noBtn.addEventListener('click', handler);

  actionContainer.appendChild(yesBtn);
  actionContainer.appendChild(noBtn);
}

// ============================================
// INIT
// ============================================

window.addEventListener('load', () => {
  // Setup forest canvas
  const forestCanvas = document.getElementById('forest-canvas');
  forestCanvas.width = window.innerWidth;
  forestCanvas.height = window.innerHeight;

  // Create snow
  createSnow();

  // Draw initial sprite (neutral color)
  drawSprite(document.getElementById('sprite-canvas'), '#c8d8c0');

  // Title screen
  setTimeout(() => {
    document.getElementById('title-screen').classList.add('fade-out');
    setTimeout(() => {
      document.getElementById('title-screen').style.display = 'none';
      // Begin opening
      setTimeout(() => {
        advanceOpening();
      }, 500);
    }, 2000);
  }, 3500);

  // Enter realm button
  document.getElementById('enter-realm-btn').addEventListener('click', () => {
    // This would navigate to the main realm
    alert('The realm awaits. (Connect this to your main Neocities page.)');
  });

  // Handle resize
  window.addEventListener('resize', () => {
    const fc = document.getElementById('forest-canvas');
    fc.width = window.innerWidth;
    fc.height = window.innerHeight;
  });
});
</script>
