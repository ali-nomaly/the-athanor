  .corner::after { width: 2px; height: 100%; }

  .corner.tr { top: 12px; right: 12px; transform: scaleX(-1); }
  .corner.bl { bottom: 12px; left: 12px; transform: scaleY(-1); }

const links = [
  // Core to all major nodes
  { source: "core", target: "bio-gut", label: "DESIRE HIJACK" },
  { source: "core", target: "bio-ophio", label: "WILL REPLACEMENT" },
  { source: "core", target: "psych-shadow", label: "COVERT OPERATION" },
  { source: "core", target: "social-egregore", label: "HOST DEPENDENCY" },
  { source: "core", target: "myth-archon", label: "COSMIC SCALE" },
  { source: "core", target: "psych-stoic", label: "IMMUNITY MECHANISM" },

  // Biological cluster
  { source: "bio-gut", target: "bio-toxo", label: "MECHANISM EXAMPLE" },
  { source: "bio-gut", target: "psych-amygdala", label: "BRAIN CAPTURE" },
  { source: "bio-toxo", target: "bio-ophio", label: "BEHAVIOR OVERRIDE" },
  { source: "bio-tick", target: "bio-lyme", label: "WEAPONIZED VECTOR" },
  { source: "bio-tick", target: "core", label: "PHASED ENTRY" },

  // Psych cluster
  { source: "psych-shadow", target: "psych-amygdala", label: "REGRESSION" },
  { source: "psych-shadow", target: "myth-archon", label: "INTERIOR ARCHON" },
  { source: "psych-loosh", target: "myth-archon", label: "FOOD SOURCE" },
  { source: "psych-stoic", target: "psych-shadow", label: "INTEGRATION" },
  { source: "psych-stoic", target: "social-egregore", label: "STARVATION TACTIC" },

  // Social cluster
  { source: "social-egregore", target: "social-media", label: "DELIVERY SYSTEM" },
  { source: "social-egregore", target: "social-psychopath", label: "HUMAN VEHICLE" },
  { source: "social-psychopath", target: "bio-lyme", label: "WEAPONIZATION" },
  { source: "social-media", target: "psych-amygdala", label: "REACTIVITY FEED" },

  // Mythological cluster
  { source: "myth-archon", target: "myth-book-jeu", label: "NAVIGATION MAP" },
  { source: "myth-archon", target: "myth-vampire", label: "PERMISSION LAW" },
  { source: "myth-archon", target: "myth-essene", label: "SATANIC WORM" },
  { source: "myth-book-jeu", target: "myth-sync-1945", label: "REDISCOVERY" },
  { source: "myth-sync-1945", target: "psych-shadow", label: "JUNG BRIDGE" },
  { source: "myth-vampire", target: "bio-tick", label: "ANESTHETIC ENTRY" },
  { source: "myth-essene", target: "bio-gut", label: "LITERAL READING" },

  // Cross-domain
  { source: "psych-loosh", target: "social-egregore", label: "ENERGY EXTRACTION" },
  { source: "bio-ophio", target: "social-egregore", label: "COLONY CAPTURE" },
  { source: "myth-vampire", target: "social-psychopath", label: "NO REFLECTION" },
  { source: "psych-stoic", target: "myth-book-jeu", label: "GNOSIS AS ARMOR" },
];

// Update counts
document.getElementById('node-count').textContent = nodes.length;
document.getElementById('link-count').textContent = links.length;

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#canvas")
  .attr("width", width)
  .attr("height", height);

// Glow filters
const defs = svg.append("defs");

nodes.forEach(n => {
  const filter = defs.append("filter").attr("id", `glow-${n.id}`);
  filter.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "coloredBlur");
  const feMerge = filter.append("feMerge");
  feMerge.append("feMergeNode").attr("in", "coloredBlur");
  feMerge.append("feMergeNode").attr("in", "SourceGraphic");
});

// Ring filter
const ringFilter = defs.append("filter").attr("id", "ring-glow");
ringFilter.append("feGaussianBlur").attr("stdDeviation", "6").attr("result", "coloredBlur");
const ringMerge = ringFilter.append("feMerge");
ringMerge.append("feMergeNode").attr("in", "coloredBlur");
ringMerge.append("feMergeNode").attr("in", "SourceGraphic");

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.3, 3])
  .on("zoom", (event) => {
    g.attr("transform", event.transform);
  });

svg.call(zoom);

const g = svg.append("g");

// Simulation
const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(d => {
    if (d.source.id === "core" || d.target.id === "core") return 160;
    return 120;
  }).strength(0.4))
  .force("charge", d3.forceManyBody().strength(-400))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => d.r + 20));

// Links
const link = g.append("g").selectAll("line")
  .data(links)
  .enter().append("line")
  .attr("stroke", "rgba(199,255,67,0.12)")
  .attr("stroke-width", 1)
  .attr("stroke-dasharray", "3,4");

// Node groups
const node = g.append("g").selectAll("g")
  .data(nodes)
  .enter().append("g")
  .attr("cursor", "pointer")
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended))
  .on("click", (event, d) => {
    event.stopPropagation();
    openPanel(d);
  })
  .on("mouseover", function(event, d) {
    d3.select(this).select(".node-circle")
      .transition().duration(150)
      .attr("r", d.r + 4);
    // Highlight connected links
    link.transition().duration(150)
      .attr("stroke", l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        return (sid === d.id || tid === d.id)
          ? d.color
          : "rgba(199,255,67,0.08)";
      })
      .attr("stroke-width", l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        return (sid === d.id || tid === d.id) ? 1.5 : 1;
      });
  })
  .on("mouseout", function(event, d) {
    d3.select(this).select(".node-circle")
      .transition().duration(150)
      .attr("r", d.r);
    link.transition().duration(150)
      .attr("stroke", "rgba(199,255,67,0.12)")
      .attr("stroke-width", 1);
  });

// Outer ring (pulse)
node.append("circle")
  .attr("class", "node-ring")
  .attr("r", d => d.r + 10)
  .attr("fill", "none")
  .attr("stroke", d => d.color)
  .attr("stroke-width", 0.5)
  .attr("opacity", 0.3)
  .attr("filter", "url(#ring-glow)")
  .style("animation-delay", (d, i) => `${i * 0.3}s`);

// Main circle
node.append("circle")
  .attr("class", "node-circle")
  .attr("r", d => d.r)
  .attr("fill", d => d.id === "core" ? "rgba(199,255,67,0.12)" : `${d.color}18`)
  .attr("stroke", d => d.color)
  .attr("stroke-width", d => d.id === "core" ? 2 : 1.5)
  .attr("filter", d => `url(#glow-${d.id})`);

// Inner circle for core
node.filter(d => d.id === "core")
  .append("circle")
  .attr("r", 8)
  .attr("fill", "#C7FF43")
  .attr("opacity", 0.6);

// Labels
node.each(function(d) {
  const g = d3.select(this);
  const lines = d.label.split('\n');
  const yStart = lines.length > 1 ? -6 : 0;
  lines.forEach((line, i) => {
    g.append("text")
      .attr("class", "node-label")
      .attr("y", yStart + i * 10)
      .attr("fill", d.color)
      .style("font-size", d.r > 30 ? "9px" : "8px")
      .text(line);
  });
  g.append("text")
    .attr("class", "node-sublabel")
    .attr("y", lines.length > 1 ? 22 : 16)
    .text(d.sub);
});

// Simulation tick
simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Drag handlers
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Click on SVG background to close panel
svg.on("click", () => {
  document.getElementById('detail-panel').style.display = 'none';
});

// Panel
function openPanel(d) {
  const panel = document.getElementById('detail-panel');
  document.getElementById('panel-domain').textContent = d.domain;
  document.getElementById('panel-title').textContent = d.title;

  const body = document.getElementById('panel-body');
  body.innerHTML = `
    <div class="panel-section">
      <span class="section-tag tag-claim">CLAIM</span>
      <div class="section-text">${d.claim}</div>
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <span class="section-tag tag-holds">HOLDS</span>
      <div class="section-text">${d.holds}</div>
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <span class="section-tag tag-fails">FAILS</span>
      <div class="section-text">${d.fails}</div>
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <span class="section-tag tag-source">SOURCE</span>
      <div class="section-text dim">${d.source}</div>
    </div>
  `;

  panel.style.display = 'block';
  body.scrollTop = 0;
}

document.getElementById('panel-close').addEventListener('click', () => {
  document.getElementById('detail-panel').style.display = 'none';
});

// Resize
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  svg.attr("width", w).attr("height", h);
  simulation.force("center", d3.forceCenter(w / 2, h / 2));
  simulation.alpha(0.1).restart();
});
</script>
</body>
</html>
