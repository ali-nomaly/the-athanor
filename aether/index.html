<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHER // THE ATHANOR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; min-height: 100vh;
  background: #080808;
  color: #C7FF43;
  font-family: 'IBM Plex Mono', monospace;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
  pointer-events: none;
  z-index: 100;
}

#corner-tl, #corner-tr {
  position: fixed;
  width: 16px; height: 16px;
  border-color: rgba(199,255,67,0.35);
  border-style: solid;
  z-index: 200;
}
#corner-tl { top: 48px; left: 8px; border-width: 1px 0 0 1px; }
#corner-tr { top: 48px; right: 8px; border-width: 1px 1px 0 0; }

#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid rgba(199,255,67,0.2);
  background: rgba(8,8,8,0.97);
  z-index: 150;
}

#header-left {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

#element-label {
  font-size: 8px;
  letter-spacing: 0.25em;
  color: rgba(199,255,67,0.35);
  text-transform: uppercase;
}

#element-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

#header-right {
  display: flex;
  gap: 20px;
  align-items: center;
}

.nav-link {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(199,255,67,0.4);
  text-decoration: none;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-link:hover { color: #C7FF43; }

#hero {
  margin-top: 44px;
  padding: 60px 40px 40px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  border-bottom: 1px solid rgba(199,255,67,0.08);
}

#element-glyph {
  font-family: 'Orbitron', sans-serif;
  font-size: 48px;
  font-weight: 900;
  color: rgba(199,255,67,0.08);
  letter-spacing: 0.1em;
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  user-select: none;
}

#element-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px;
  font-weight: 900;
  letter-spacing: 0.15em;
  color: #C7FF43;
  margin-bottom: 12px;
  text-transform: uppercase;
}

#element-gloss {
  font-size: 11px;
  color: rgba(199,255,67,0.4);
  letter-spacing: 0.1em;
  line-height: 1.8;
  max-width: 520px;
  border-left: 2px solid rgba(199,255,67,0.2);
  padding-left: 14px;
}

#grid-section {
  position: relative;
  z-index: 1;
  padding: 40px;
}

#grid-label {
  font-size: 8px;
  letter-spacing: 0.3em;
  color: rgba(199,255,67,0.25);
  text-transform: uppercase;
  margin-bottom: 20px;
}

#subhub-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1px;
}

.subhub-card {
  border: 1px solid rgba(199,255,67,0.12);
  background: rgba(199,255,67,0.015);
  padding: 28px 24px;
  text-decoration: none;
  color: inherit;
  display: block;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
}

.subhub-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: transparent;
  transition: background 0.2s;
}

.subhub-card:hover {
  border-color: rgba(199,255,67,0.4);
  background: rgba(199,255,67,0.04);
}

.subhub-card:hover::before { background: #C7FF43; }

.card-tag {
  font-size: 7px;
  letter-spacing: 0.25em;
  color: rgba(199,255,67,0.3);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: #C7FF43;
  margin-bottom: 12px;
  text-transform: uppercase;
}

.card-gloss {
  font-size: 10px;
  color: rgba(199,255,67,0.45);
  line-height: 1.9;
  margin-bottom: 20px;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-count {
  font-size: 8px;
  letter-spacing: 0.15em;
  color: rgba(199,255,67,0.2);
}

.card-arrow {
  font-size: 11px;
  color: rgba(199,255,67,0.25);
  transition: color 0.2s, transform 0.2s;
}

.subhub-card:hover .card-arrow {
  color: #C7FF43;
  transform: translateX(4px);
}

#status-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-top: 1px solid rgba(199,255,67,0.1);
  background: rgba(8,8,8,0.97);
  font-size: 8px;
  letter-spacing: 0.15em;
  color: rgba(199,255,67,0.25);
  z-index: 150;
}

body { padding-bottom: 48px; }
</style>
</head>
<body>

<div id="corner-tl"></div>
<div id="corner-tr"></div>

<header id="header">
  <div id="header-left">
    <span id="element-label">ELEMENT</span>
    <span id="element-title">AETHER</span>
  </div>
  <div id="header-right">
    <a class="nav-link" href="/">← ATHANOR</a>
    <a class="nav-link" href="/log/">LOG</a>
  </div>
</header>

<div id="hero">
  <div id="element-glyph">AETHER</div>
  <div id="element-name">AETHER</div>
  <div id="element-gloss">Synthesis and quintessence. Knowledge distilled from reading — the fifth element.</div>
</div>

<div id="grid-section">
  <div id="grid-label">DOMAINS //</div>
  <div id="subhub-grid">

    <a class="subhub-card" href="/aether/codex/">
      <div class="card-tag">AETHER // DOMAIN</div>
      <div class="card-title">CODEX</div>
      <div class="card-gloss">Nonfiction book summaries and visual notes. The read archive.</div>
      <div class="card-footer">
        <span class="card-count">ENTER DOMAIN</span>
        <span class="card-arrow">→</span>
      </div>
    </a>

  </div>
</div>

<div id="status-bar">
  <span>MAGI:ACTIVE // ELEMENT:AETHER</span>
  <span id="status-date"></span>
  <span>alinomali.com</span>
</div>

<script>
document.getElementById('status-date').textContent = new Date().toISOString().slice(0,10).replace(/-/g,'.');
</script>
</body>
</html>
