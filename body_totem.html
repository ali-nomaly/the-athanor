<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Totem</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0ede6;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: serif;
  }

  /* Aged parchment texture effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent: 28px,
        rgba(160,150,120,0.13) 28px,
        rgba(160,150,120,0.13) 29px
      );
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    width: 420px;
    min-height: 680px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  svg {
    width: 260px;
    height: 620px;
    overflow: visible;
    filter: drop-shadow(0 2px 12px rgba(40,30,20,0.08));
  }

  /* Ink line style — mimics ballpoint pen on paper */
  .ink {
    fill: none;
    stroke: #1a1628;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .ink-thin { stroke-width: 1.2; }
  .ink-mid  { stroke-width: 1.6; }
  .ink-thick { stroke-width: 2.0; }

  .ink-fill { fill: #1a1628; stroke: none; }
  .ink-fill-light { fill: rgba(26,22,40,0.12); stroke: none; }

  /* Subtle entrance animation */
  svg {
    animation: inkReveal 1.8s ease both;
  }
  @keyframes inkReveal {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div class="page">
<svg viewBox="0 0 260 620" xmlns="http://www.w3.org/2000/svg">

  <!-- ══════════════════════════════════════
       1. CROWN / FLAME — Divine Spark above
       Trident-flame with loop descending
  ═══════════════════════════════════════ -->

  <!-- Central flame -->
  <path class="ink ink-mid"
    d="M130,14 C128,10 124,6 126,2 C127,5 130,4 132,2 C130,6 131,10 130,14Z"
  />
  <!-- Left flame petal -->
  <path class="ink ink-thin"
    d="M130,14 C124,10 118,5 120,1 C122,6 127,8 130,14Z"
  />
  <!-- Right flame petal -->
  <path class="ink ink-thin"
    d="M130,14 C136,10 142,5 140,1 C138,6 133,8 130,14Z"
  />
  <!-- Small descending loop below flame -->
  <circle class="ink ink-thin" cx="130" cy="20" r="4"/>
  <!-- Stem connecting flame to head sphere -->
  <line class="ink ink-thin" x1="130" y1="24" x2="130" y2="46"/>


  <!-- ══════════════════════════════════════
       2. HEAD — Sphere bisected with
          great circle, inner triangle,
          all-seeing eye at center
  ═══════════════════════════════════════ -->

  <!-- Main skull sphere -->
  <circle class="ink ink-mid" cx="130" cy="88" r="42"/>

  <!-- Great circle / equatorial band (slightly tilted, like your drawing) -->
  <ellipse class="ink ink-thin" cx="130" cy="88" rx="42" ry="14"
    transform="rotate(-8, 130, 88)"/>

  <!-- Inner triangle (pointing up — fire / intellect) -->
  <polygon class="ink ink-thin"
    points="130,62  108,104  152,104"
  />

  <!-- All-seeing eye at center of triangle -->
  <!-- Eye outline -->
  <path class="ink ink-thin"
    d="M116,88 Q130,76 144,88 Q130,100 116,88Z"
  />
  <!-- Iris -->
  <circle class="ink ink-thin" cx="130" cy="88" r="7"/>
  <!-- Pupil dot -->
  <circle class="ink-fill" cx="130" cy="88" r="2.8"/>

  <!-- Light hemisphere fill (right side, like your shading) -->
  <path class="ink-fill-light"
    d="M130,46 A42,42 0 0 1 172,88 A42,42 0 0 1 130,130 Z"
    opacity="0.4"
  />

  <!-- Horizontal axis line through eye -->
  <line class="ink ink-thin" x1="88" y1="88" x2="172" y2="88" opacity="0.4"/>
  <!-- Vertical axis -->
  <line class="ink ink-thin" x1="130" y1="46" x2="130" y2="130" opacity="0.3"/>


  <!-- ══════════════════════════════════════
       3. THROAT / SPINE COLUMN
          Segmented vertebrae pillar
  ═══════════════════════════════════════ -->

  <!-- Outer column borders -->
  <line class="ink ink-thin" x1="120" y1="130" x2="120" y2="170"/>
  <line class="ink ink-thin" x1="140" y1="130" x2="140" y2="170"/>

  <!-- Vertebral segments — horizontal cross-hatching -->
  <line class="ink ink-thin" x1="120" y1="136" x2="140" y2="136"/>
  <line class="ink ink-thin" x1="120" y1="142" x2="140" y2="142"/>
  <line class="ink ink-thin" x1="120" y1="148" x2="140" y2="148"/>
  <line class="ink ink-thin" x1="120" y1="154" x2="140" y2="154"/>
  <line class="ink ink-thin" x1="120" y1="160" x2="140" y2="160"/>
  <line class="ink ink-thin" x1="120" y1="166" x2="140" y2="166"/>

  <!-- Small knob connectors on sides (transverse processes) -->
  <line class="ink ink-thin" x1="115" y1="136" x2="120" y2="136"/>
  <line class="ink ink-thin" x1="140" y1="136" x2="145" y2="136"/>
  <line class="ink ink-thin" x1="115" y1="148" x2="120" y2="148"/>
  <line class="ink ink-thin" x1="140" y1="148" x2="145" y2="148"/>
  <line class="ink ink-thin" x1="115" y1="160" x2="120" y2="160"/>
  <line class="ink ink-thin" x1="140" y1="160" x2="145" y2="160"/>


  <!-- ══════════════════════════════════════
       4. CHEST / HEART CENTER
          Hexagon with internal triangle,
          central dot, flanked by two
          eye-circle luminaries
  ═══════════════════════════════════════ -->

  <!-- Hexagon (heart center) -->
  <polygon class="ink ink-mid"
    points="130,172  152,184  152,208  130,220  108,208  108,184"
  />

  <!-- Inner triangle inside hex (upward) -->
  <polygon class="ink ink-thin"
    points="130,178  150,210  110,210"
  />

  <!-- Central dot / Tiphareth point -->
  <circle class="ink ink-thin" cx="130" cy="196" r="5"/>
  <circle class="ink-fill" cx="130" cy="196" r="2"/>

  <!-- Axis lines through center of hex -->
  <line class="ink ink-thin" x1="108" y1="196" x2="152" y2="196" opacity="0.4"/>
  <line class="ink ink-thin" x1="130" y1="172" x2="130" y2="220" opacity="0.3"/>

  <!-- LEFT luminary — Moon eye -->
  <circle class="ink ink-mid" cx="82" cy="196" r="14"/>
  <circle class="ink ink-thin" cx="82" cy="196" r="7"/>
  <circle class="ink-fill" cx="82" cy="196" r="2.5"/>

  <!-- RIGHT luminary — Sun eye -->
  <circle class="ink ink-mid" cx="178" cy="196" r="14"/>
  <circle class="ink ink-thin" cx="178" cy="196" r="7"/>
  <circle class="ink-fill" cx="178" cy="196" r="2.5"/>

  <!-- Thin connecting lines from hex to luminaries -->
  <line class="ink ink-thin" x1="108" y1="196" x2="96" y2="196" opacity="0.5"/>
  <line class="ink ink-thin" x1="152" y1="196" x2="164" y2="196" opacity="0.5"/>


  <!-- ══════════════════════════════════════
       5. CONNECTION from chest to pelvis
          Short spine continuation
  ═══════════════════════════════════════ -->
  <line class="ink ink-thin" x1="130" y1="220" x2="130" y2="242"/>


  <!-- ══════════════════════════════════════
       6. PELVIS / GENERATIVE CENTER
          Diamond-rhombus with inverted
          triangle and inner sphere
  ═══════════════════════════════════════ -->

  <!-- Outer diamond / rhombus -->
  <polygon class="ink ink-mid"
    points="130,242  162,278  130,314  98,278"
  />

  <!-- Inner circle / sphere -->
  <circle class="ink ink-thin" cx="130" cy="278" r="22"/>

  <!-- Inverted triangle (water / generative) inside diamond -->
  <polygon class="ink ink-thin"
    points="130,314  156,262  104,262"
  />

  <!-- Horizontal axis through pelvis center -->
  <line class="ink ink-thin" x1="108" y1="278" x2="152" y2="278" opacity="0.4"/>
  <!-- Vertical axis -->
  <line class="ink ink-thin" x1="130" y1="256" x2="130" y2="300" opacity="0.3"/>

  <!-- Central dot -->
  <circle class="ink ink-thin" cx="130" cy="278" r="4"/>
  <circle class="ink-fill" cx="130" cy="278" r="1.8"/>

  <!-- Small secondary diamond inside (inner form) -->
  <polygon class="ink ink-thin"
    points="130,258  148,278  130,298  112,278"
    opacity="0.5"
  />


  <!-- ══════════════════════════════════════
       7. BASE / FEET — Two eye-circles
          flanking the root, grounding
  ═══════════════════════════════════════ -->

  <!-- Thin stem descending -->
  <line class="ink ink-thin" x1="130" y1="314" x2="130" y2="336" opacity="0.5"/>

  <!-- LEFT foot-eye -->
  <circle class="ink ink-mid" cx="96" cy="350" r="15"/>
  <circle class="ink ink-thin" cx="96" cy="350" r="7"/>
  <circle class="ink-fill" cx="96" cy="350" r="2.5"/>

  <!-- RIGHT foot-eye -->
  <circle class="ink ink-mid" cx="164" cy="350" r="15"/>
  <circle class="ink ink-thin" cx="164" cy="350" r="7"/>
  <circle class="ink-fill" cx="164" cy="350" r="2.5"/>

  <!-- Ground line -->
  <line class="ink ink-thin" x1="70" y1="370" x2="190" y2="370" opacity="0.25"/>

</svg>
</div>
</body>
</html>
