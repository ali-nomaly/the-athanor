
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  
  html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #080808;
  }
  #athanor-root {
    width: 100%;
    height: 100vh;
    background: #080808;
    position: relative;
    overflow: hidden;
    font-family: 'IBM Plex Mono', monospace;
  }

  #athanor-root::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none;
    z-index: 10;
  }

  #athanor-canvas { display: block; }

  #header-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(199,255,67,0.2);
    z-index: 20;
  }

  #header-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #C7FF43;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  #header-meta {
    font-size: 10px;
    color: rgba(199,255,67,0.45);
    letter-spacing: 0.15em;
  }
  
  #detail-panel {
    position: absolute;
    bottom: 0; right: 0;
    width: 280px;
    background: rgba(8,8,8,0.97);
    border-left: 1px solid rgba(199,255,67,0.3);
    border-top: 1px solid rgba(199,255,67,0.3);
    padding: 20px;
    z-index: 30;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }

  #detail-panel.open { transform: translateX(0); }

  #panel-domain {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(199,255,67,0.5);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  #panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #C7FF43;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  #panel-gloss {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    margin-bottom: 16px;
    border-left: 2px solid rgba(199,255,67,0.3);
    padding-left: 10px;
  }

  #panel-meta {
    font-size: 9px;
    color: rgba(199,255,67,0.35);
    letter-spacing: 0.12em;
    margin-bottom: 16px;
  }

  #panel-btn {
    display: block;
    width: 100%;
    padding: 9px 0;
    background: transparent;
    border: 1px solid rgba(199,255,67,0.5);
    color: #C7FF43;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  #panel-btn:hover { background: rgba(199,255,67,0.1); }

  #panel-close {
    position: absolute;
    top: 12px; right: 14px;
    background: none;
    border: none;
    color: rgba(199,255,67,0.4);
    font-size: 16px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1;
    padding: 0;
  }
  #panel-close:hover { color: #C7FF43; }

  #legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 9px;
    color: rgba(199,255,67,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .legend-shape { width: 14px; height: 14px; }

  #corner-tl, #corner-tr, #corner-bl, #corner-br {
    position: absolute;
    width: 14px;
    height: 14px;
    border-color: rgba(199,255,67,0.35);
    border-style: solid;
    z-index: 20;
  }
  #corner-tl { top: 40px; left: 8px; border-width: 1px 0 0 1px; }
  #corner-tr { top: 40px; right: 8px; border-width: 1px 1px 0 0; }
  #corner-bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
  #corner-br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

  #log-link {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(199,255,67,0.45);
  text-decoration: none;
  text-transform: uppercase;
  font-family: 'IBM Plex Mono', monospace;
  transition: color 0.2s;
}
#log-link:hover { color: #C7FF43; }

</style>

<div id="athanor-root">
  <div id="corner-tl"></div>
  <div id="corner-tr"></div>
  <div id="corner-bl"></div>
  <div id="corner-br"></div>

<div id="header-bar">
  <div id="header-title">THE ATHANOR</div>
  <a href="/log/log-index" id="log-link">THE LOG →</a>
  <div id="header-meta">ARCHIVE // alinomali.com // MAGI:ACTIVE</div>
</div>

  <canvas id="athanor-canvas"></canvas>

  <div id="detail-panel">
    <button id="panel-close">✕</button>
    <div id="panel-domain">—</div>
    <div id="panel-title">—</div>
    <div id="panel-gloss">—</div>
    <div id="panel-meta">—</div>
    <button id="panel-btn">ENTER ENTRY →</button>
  </div>

  <div id="legend">
    <div class="legend-item">
      <svg class="legend-shape" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="none" stroke="#C7FF43" stroke-width="1.5"/></svg>
      CORPUS
    </div>
    <div class="legend-item">
      <svg class="legend-shape" viewBox="0 0 14 14"><polygon points="7,1 13,13 1,13" fill="none" stroke="#C7FF43" stroke-width="1.5"/></svg>
      ANIMA
    </div>
    <div class="legend-item">
      <svg class="legend-shape" viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" fill="none" stroke="#C7FF43" stroke-width="1.5" transform="rotate(45 7 7)"/></svg>
      SPIRITUS
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const nodes = [
  { id: 'hub',       label: 'ATHANOR',   domain: 'hub',      gloss: 'The living archive. A digital record of one lifetime examined.', path: '/', date: '2026' },
  { id: 'craft',     label: 'CRAFT',     domain: 'corpus',   gloss: 'Visual guides for making things. Crochet, music production, coding, art software.', path: '/corpus/craft/', date: '2026' },
  { id: 'analysis',  label: 'ANALYSIS',  domain: 'corpus',   gloss: 'Visual breakdowns of film, television, and music.', path: '/corpus/analysis/', date: '2026' },
  { id: 'thinkers',  label: 'THINKERS',  domain: 'anima',    gloss: 'Philosopher and thinker depictions. Ideas given visual form.', path: '/anima/thinkers/', date: '2026' },
  { id: 'esoterica', label: 'ESOTERICA', domain: 'anima',    gloss: 'Visual guides to esoteric subjects. Hermetic, alchemical, symbolic.', path: '/anima/esoterica/', date: '2026' },
  { id: 'codex',     label: 'CODEX',     domain: 'spiritus', gloss: 'Nonfiction book summaries and visual notes. The read archive.', path: '/spiritus/codex/', date: '2026' },
];

const links = [
  { source: 'hub', target: 'craft' },
  { source: 'hub', target: 'analysis' },
  { source: 'hub', target: 'thinkers' },
  { source: 'hub', target: 'esoterica' },
  { source: 'hub', target: 'codex' },
  { source: 'craft',     target: 'analysis' },
  { source: 'thinkers',  target: 'esoterica' },
  { source: 'esoterica', target: 'codex' },
];

const domainColors = {
  hub: '#C7FF43',
  corpus: '#C7FF43',
  anima: '#C7FF43',
  spiritus: '#C7FF43',
};

const domainAlpha = { hub: 1, corpus: 0.9, anima: 0.9, spiritus: 0.9 };

const root = document.getElementById('athanor-root');
const canvas = document.getElementById('athanor-canvas');
const ctx = canvas.getContext('2d');

let W, H, scale = 1;
let hoveredNode = null;
let pulseT = 0;
let animFrame;
let currentNode = null;

function resize() {
  const rect = root.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  scale = window.devicePixelRatio || 1;
  canvas.width = W * scale;
  canvas.height = H * scale;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(scale, scale);
}

resize();

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.source.id === 'hub' ? 130 : 80).strength(0.8))
  .force('charge', d3.forceManyBody().strength(-280))
  .force('center', d3.forceCenter(W / 2, H / 2 + 20))
  .force('collision', d3.forceCollide().radius(d => d.id === 'hub' ? 50 : 36))
  .alphaDecay(0.015);

function drawDiamond(x, y, r) {
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.lineTo(x + r, y);
  ctx.lineTo(x, y + r);
  ctx.lineTo(x - r, y);
  ctx.closePath();
}

function drawTriangle(x, y, r) {
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.lineTo(x + r * 0.866, y + r * 0.5);
  ctx.lineTo(x - r * 0.866, y + r * 0.5);
  ctx.closePath();
}

function getNodeRadius(d) {
  return d.id === 'hub' ? 22 : 14;
}

function drawNode(d, pulse) {
  const x = d.x, y = d.y;
  const r = getNodeRadius(d);
  const isHovered = hoveredNode && hoveredNode.id === d.id;
  const pr = isHovered ? r + pulse * 8 : r;

  ctx.save();

  if (isHovered) {
    ctx.globalAlpha = 0.12 + pulse * 0.08;
    ctx.fillStyle = '#C7FF43';
    if (d.domain === 'corpus' || d.id === 'hub') { ctx.beginPath(); ctx.arc(x, y, pr + 10, 0, Math.PI * 2); ctx.fill(); }
    else if (d.domain === 'anima') { drawTriangle(x, y, pr + 10); ctx.fill(); }
    else { drawDiamond(x, y, pr + 10); ctx.fill(); }
    ctx.globalAlpha = 1;
  }

  ctx.strokeStyle = '#C7FF43';
  ctx.lineWidth = d.id === 'hub' ? 2 : 1.5;
  ctx.fillStyle = d.id === 'hub' ? 'rgba(199,255,67,0.12)' : 'rgba(8,8,8,0.9)';

  if (d.id === 'hub') {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(x, y, r - 5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(199,255,67,0.3)'; ctx.lineWidth = 0.5; ctx.stroke();
  } else if (d.domain === 'corpus') {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
  } else if (d.domain === 'anima') {
    drawTriangle(x, y, r); ctx.fill(); ctx.stroke();
  } else if (d.domain === 'spiritus') {
    drawDiamond(x, y, r); ctx.fill(); ctx.stroke();
  }

  ctx.fillStyle = '#C7FF43';
  ctx.font = d.id === 'hub'
    ? "700 9px 'Orbitron', monospace"
    : "400 7.5px 'IBM Plex Mono', monospace";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (d.id === 'hub') {
    ctx.fillText(d.label, x, y);
  } else {
    const words = d.label.split(' ');
    if (words.length === 1) {
      ctx.fillText(d.label, x, y + r + 11);
    } else {
      ctx.fillText(words[0], x, y + r + 9);
      ctx.fillText(words.slice(1).join(' '), x, y + r + 19);
    }
  }

  ctx.restore();
}

function draw() {
  pulseT += 0.04;
  const pulse = (Math.sin(pulseT) + 1) / 2;

  ctx.clearRect(0, 0, W, H);

  ctx.save();
  links.forEach(link => {
    ctx.beginPath();
    ctx.moveTo(link.source.x, link.source.y);
    ctx.lineTo(link.target.x, link.target.y);
    const isConnected = hoveredNode && (link.source.id === hoveredNode.id || link.target.id === hoveredNode.id);
    ctx.strokeStyle = isConnected ? 'rgba(199,255,67,0.5)' : 'rgba(199,255,67,0.1)';
    ctx.lineWidth = isConnected ? 1 : 0.5;
    ctx.stroke();
  });
  ctx.restore();

  nodes.forEach(d => drawNode(d, pulse));

  animFrame = requestAnimationFrame(draw);
}

sim.on('tick', () => {});
draw();

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function hitTest(mx, my) {
  for (const d of nodes) {
    const r = getNodeRadius(d) + 10;
    const dx = mx - d.x, dy = my - d.y;
    if (dx * dx + dy * dy < r * r) return d;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  const { x, y } = getMousePos(e);
  hoveredNode = hitTest(x, y);
  canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
});

canvas.addEventListener('mouseleave', () => { hoveredNode = null; });

const panel = document.getElementById('detail-panel');
const panelDomain = document.getElementById('panel-domain');
const panelTitle = document.getElementById('panel-title');
const panelGloss = document.getElementById('panel-gloss');
const panelMeta = document.getElementById('panel-meta');
const panelBtn = document.getElementById('panel-btn');

canvas.addEventListener('click', e => {
  const { x, y } = getMousePos(e);
  const hit = hitTest(x, y);
  if (hit) {
    currentNode = hit;
    panelDomain.textContent = hit.domain.toUpperCase() + ' // ' + hit.date;
    panelTitle.textContent = hit.label;
    panelGloss.textContent = hit.gloss;
    panelMeta.textContent = 'PATH: ' + hit.path;
    panel.classList.add('open');
  }
});

document.getElementById('panel-close').addEventListener('click', () => {
  panel.classList.remove('open');
  currentNode = null;
});

panelBtn.addEventListener('click', () => {
  if (currentNode) {
    window.location.href = currentNode.path;
  }
});

window.addEventListener('resize', () => {
  resize();
  sim.force('center', d3.forceCenter(W / 2, H / 2 + 20));
  sim.alpha(0.1).restart();
});
</script>
