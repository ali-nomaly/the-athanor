<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALI // OPERATOR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: 'IBM Plex Mono', monospace;
}

/* scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
  pointer-events: none;
  z-index: 200;
}

#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid rgba(199,255,67,0.2);
  background: rgba(0,0,0,0.85);
  z-index: 150;
}

#header-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #C7FF43;
  letter-spacing: 0.2em;
}

.nav-link {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(199,255,67,0.4);
  text-decoration: none;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-link:hover { color: #C7FF43; }

/* room container */
#room-wrap {
  position: fixed;
  top: 40px; bottom: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
}

#room-stage {
  position: relative;
  /* scaled to fit viewport while preserving aspect ratio */
  width: min(993px, 100vw);
  aspect-ratio: 993 / 759;
}

#room-gif {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
}

/* hotspot base */
.hotspot {
  position: absolute;
  cursor: url('/about/assets/glove_mouse.cur'), pointer;
  background: transparent;
  border: none;
  outline: none;
  z-index: 10;
  transition: background 0.15s;
}

.hotspot:hover {
  background: rgba(199,255,67,0.08);
  outline: 1px solid rgba(199,255,67,0.3);
}

/* tooltip */
#tooltip {
  position: fixed;
  z-index: 300;
  background: rgba(0,0,0,0.92);
  border: 1px solid rgba(199,255,67,0.4);
  padding: 10px 14px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 220px;
}

#tooltip.visible { opacity: 1; }

#tooltip-label {
  font-size: 7px;
  letter-spacing: 0.25em;
  color: rgba(199,255,67,0.4);
  text-transform: uppercase;
  margin-bottom: 5px;
}

#tooltip-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: #C7FF43;
  margin-bottom: 4px;
}

#tooltip-desc {
  font-size: 9px;
  color: rgba(199,255,67,0.55);
  line-height: 1.6;
}

#corner-tl, #corner-tr, #corner-bl, #corner-br {
  position: fixed;
  width: 14px; height: 14px;
  border-color: rgba(199,255,67,0.3);
  border-style: solid;
  z-index: 160;
}
#corner-tl { top: 44px; left: 8px; border-width: 1px 0 0 1px; }
#corner-tr { top: 44px; right: 8px; border-width: 1px 1px 0 0; }
#corner-bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
#corner-br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

#status-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-top: 1px solid rgba(199,255,67,0.1);
  background: rgba(0,0,0,0.85);
  font-size: 8px;
  letter-spacing: 0.15em;
  color: rgba(199,255,67,0.25);
  z-index: 150;
}
</style>
</head>
<body>

<div id="corner-tl"></div>
<div id="corner-tr"></div>
<div id="corner-bl"></div>
<div id="corner-br"></div>

<header id="header">
  <div id="header-title">ALI // OPERATOR</div>
  <a class="nav-link" href="/">← ATHANOR</a>
</header>

<div id="room-wrap">
  <div id="room-stage">
    <img id="room-gif" src="assets/about-room.gif" alt="Ali's room">

    <!-- ══ HOTSPOTS ══
         coordinates are % of room-stage width/height
         adjust after previewing — these are estimated from the 993x759 image -->

    <!-- CHARACTER / ALI -->
    <a class="hotspot" href="#"
       data-label="OPERATOR"
       data-title="ALI"
       data-desc="27. Mexican. Depth in process. This archive is the record."
       style="left:13%; top:43%; width:14%; height:35%;">
    </a>

    <!-- MEXICAN FLAG -->
    <a class="hotspot" href="#"
       data-label="ORIGIN"
       data-title="MÉXICO"
       data-desc="Where the body learned its first language."
       style="left:5%; top:26%; width:18%; height:28%;">
    </a>

    <!-- CONGAS -->
    <a class="hotspot" href="#"
       data-label="PERCUSSION"
       data-title="CONGAS"
       data-desc="Rhythm as somatic practice. The body keeping time before the mind does."
       style="left:25%; top:52%; width:10%; height:22%;">
    </a>

    <!-- KEYBOARD / SYNTH -->
    <a class="hotspot" href="#"
       data-label="PRODUCTION"
       data-title="KEYBOARD"
       data-desc="LMMS. Darkwave. The voice that isn't words."
       style="left:33%; top:62%; width:18%; height:18%;">
    </a>

    <!-- LAPTOP -->
    <a class="hotspot" href="#"
       data-label="THE WORK"
       data-title="LAPTOP"
       data-desc="Where the Athanor was built. Where the archive lives."
       style="left:54%; top:38%; width:12%; height:20%;">
    </a>

    <!-- GAMING SETUP / SWITCH -->
    <a class="hotspot" href="#"
       data-label="PLAY"
       data-title="GAMING"
       data-desc="Nintendo Switch. The games that shaped the inner vocabulary."
       style="left:66%; top:35%; width:10%; height:22%;">
    </a>

    <!-- MONITOR / PC TOWER -->
    <a class="hotspot" href="#"
       data-label="SYSTEM"
       data-title="THE RIG"
       data-desc="The machine. Where everything is made."
       style="left:59%; top:28%; width:10%; height:22%;">
    </a>

    <!-- STOP SIGN PLANT -->
    <a class="hotspot" href="#"
       data-label="???"
       data-title="STOP"
       data-desc="A stop sign growing out of a plant. Draw your own conclusions."
       style="left:42%; top:14%; width:10%; height:28%;">
    </a>

    <!-- BOOKS / SHELF -->
    <a class="hotspot" href="#"
       data-label="CODEX"
       data-title="THE BOOKS"
       data-desc="Everything read. Everything that changed the shape of the mind."
       style="left:62%; top:46%; width:7%; height:20%;">
    </a>

    <!-- FRAMED PICTURES -->
    <a class="hotspot" href="#"
       data-label="MEMORY"
       data-title="FRAMES"
       data-desc="What gets put on walls. What deserves to be looked at every day."
       style="left:76%; top:28%; width:14%; height:24%;">
    </a>

    <!-- BED -->
    <a class="hotspot" href="#"
       data-label="REST"
       data-title="THE BED"
       data-desc="Where the nervous system recovers. Where dreams happen."
       style="left:45%; top:68%; width:24%; height:24%;">
    </a>

  </div>
</div>

<div id="tooltip">
  <div id="tooltip-label"></div>
  <div id="tooltip-title"></div>
  <div id="tooltip-desc"></div>
</div>

<div id="status-bar">
  <span>MAGI:ACTIVE // OPERATOR:ALI</span>
  <span id="status-date"></span>
  <span>alinomali.com/about</span>
</div>

<script>
document.getElementById('status-date').textContent = new Date().toISOString().slice(0,10).replace(/-/g,'.');

const tooltip = document.getElementById('tooltip');
const ttLabel = document.getElementById('tooltip-label');
const ttTitle = document.getElementById('tooltip-title');
const ttDesc  = document.getElementById('tooltip-desc');

document.querySelectorAll('.hotspot').forEach(el => {
  el.addEventListener('mouseenter', e => {
    ttLabel.textContent = el.dataset.label;
    ttTitle.textContent = el.dataset.title;
    ttDesc.textContent  = el.dataset.desc;
    tooltip.classList.add('visible');
  });

  el.addEventListener('mousemove', e => {
    const x = e.clientX + 16;
    const y = e.clientY + 16;
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    tooltip.style.left = (x + tw > window.innerWidth ? x - tw - 32 : x) + 'px';
    tooltip.style.top  = (y + th > window.innerHeight ? y - th - 32 : y) + 'px';
  });

  el.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });
});
</script>
</body>
</html>
